<div class="strength-query">
  <h2>Student Strength Query</h2>

  <div class="query-card">
    <p class="description">Find the count of students by gender and standard (class).</p>

    <div class="query-form">
      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender" [(ngModel)]="gender">
          <option value="" disabled>Select gender</option>
          <option value="MALE">Male</option>
          <option value="FEMALE">Female</option>
          <option value="OTHER">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="standard">Standard</label>
        <input
          type="number"
          id="standard"
          [(ngModel)]="standard"
          placeholder="1-12"
          min="1"
          max="12"
        />
      </div>

      <button
        (click)="queryStrength()"
        class="btn btn-primary"
        [disabled]="!gender || standard === null || loading"
      >
        {{ loading ? 'Querying...' : 'Query Strength' }}
      </button>
    </div>

    <div *ngIf="error" class="error-message">{{ error }}</div>

    <div *ngIf="strength !== null" class="result-display">
      <div class="strength-result">
        <span class="label">Student Count</span>
        <span class="value">{{ strength }}</span>
        <span class="subtitle">{{ gender }} students in Standard {{ standard }}</span>
      </div>
    </div>
  </div>
</div>
